name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z). Defaults to apps/desktop/package.json version."
        required: false
        default: ""
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            version="${GITHUB_REF_NAME#desktop-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="$(jq -r .version apps/desktop/package.json)"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Resolved version: $version"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    env:
      YISHAN_CLI_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/cli/go.mod
          cache-dependency-path: apps/cli/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker hoisted

      - name: Build CLI binary
        working-directory: apps/desktop
        run: bun run cli:build

      - name: Build renderer and electron
        working-directory: apps/desktop
        run: bun run build

      # macOS code signing & notarization
      - name: Import macOS signing certificate
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          if [[ -z "$CSC_LINK" ]]; then
            echo "::warning::No macOS signing certificate configured. Skipping."
            exit 0
          fi
          echo "Certificate configured via CSC_LINK"

      - name: Resolve electron version
        id: electron
        working-directory: apps/desktop
        run: |
          version=$(node -e "const p=require('./node_modules/electron/package.json');console.log(p.version)" 2>/dev/null \
            || node -e "const p=require('../../node_modules/electron/package.json');console.log(p.version)")
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Resolved electron version: $version"

      - name: Build & package Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx electron-builder --publish never -c.electronVersion=${{ steps.electron.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.snap
            apps/desktop/release/*.yml
            apps/desktop/release/*.yaml
            apps/desktop/release/latest*.json
          if-no-files-found: warn

  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: List release artifacts
        run: ls -lhR artifacts/

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          tag="desktop-v${version}"

          # Collect release files
          shopt -s nullglob
          files=(artifacts/*.dmg artifacts/*.zip artifacts/*.AppImage artifacts/*.deb artifacts/*.rpm artifacts/*.snap artifacts/*.yml artifacts/*.yaml)
          shopt -u nullglob

          # Delete existing release for this tag (re-runs / retries)
          if gh release view "$tag" &>/dev/null; then
            echo "Deleting existing release for $tag"
            gh release delete "$tag" --yes --cleanup-tag=false
          fi

          args=(
            "$tag"
            --title "Desktop v${version}"
            --generate-notes
          )

          # Add draft flag
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.draft }}" == "true" ]]; then
            args+=(--draft)
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            args+=(--draft)
          fi

          # For dispatch runs the tag may not exist yet
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            args+=(--target "${{ github.sha }}")
          fi

          if [[ ${#files[@]} -gt 0 ]]; then
            gh release create "${args[@]}" "${files[@]}"
          else
            gh release create "${args[@]}"
            echo "::warning::No distributable artifacts found to attach."
          fi
